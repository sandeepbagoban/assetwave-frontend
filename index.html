<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AssetWave — Broadcast & Media Asset Intelligence Platform. Turn dormant telecom and media equipment into cash with escrow-protected marketplace transactions." />
    <title>AssetWave — Broadcast & Media Asset Intelligence Platform</title>
    <script>
      // Set the theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('assetwave_theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
